name: Go build

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.23.2'
      working-directory:
        description: 'Working directory'
        required: false
        default: '.'
        type: string
      ubuntu-version:
        description: 'Ubuntu version'
        required: false
        type: string
        default: '22.04'
      build-flags:
        description: 'Build flags'
        required: false
        type: string
        default: '-v'
      output-binary:
        description: 'Output binary name'
        required: false
        type: string
        default: 'app'

jobs:
  build:
    name: Build application
    runs-on: ubuntu-${{ inputs.ubuntu-version }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checout code
        uses: actions/checkout@v6

      - name: Setups Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ${{ inputs.build-flags }} -o ${{ inputs.output-binary }} cmd/*.go

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.output-binary }}
          path: ${{ inputs.working-directory }}/${{ inputs.output-binary }}
          retention-days: 7
