name: Go test

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use (default: 1.23.2)'
        required: false
        type: string
        default: '1.23.2'
      working-directory:
        description: 'Working directory for the project (default: .)'
        required: false
        type: string
        default: '.'
      timeout:
        description: 'Test timeout (default: 5m)'
        required: false
        type: string
        default: '5m'
      ubuntu-version:
        description: 'Ubuntu version for actions runner (default: 22.04)'
        required: false
        type: string
        default: '22.04'
      test-flags:
        description: 'Flags for go test'
        required: false
        type: string
        default: '-v -race -coverprofile=coverage.txt -covermode=atomic'
      upload-coverage:
        description: 'Show coverage report after tests'
        required: false
        type: boolean
        default: true

    secrets:
      CODECOV_TOKEN:
        description: 'Token for codecov'
        required: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-${{ inputs.ubuntu-version }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ${{ inputs.test-flags }} ./...

      - name: Show coverage
        if: inputs.upload-coverage == true
        run: go tool cover -func=coverage.txt
