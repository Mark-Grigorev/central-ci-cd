name: Go Security Scan

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: '1.23.2'
      working-directory:
        required: false
        type: string
        default: '.'
      ubuntu-servion:
        required: false
        type: string
        default: '22.04'

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-${{ inputs.ubuntu-servion }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          chache: true

      - name: Start govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...