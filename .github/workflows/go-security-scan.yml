name: Go Security Scan

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use (default: 1.23.2)'
        required: false
        type: string
        default: '1.23.2'
      working-directory:
        description: 'Working directory for the project (default: .)'
        required: false
        type: string
        default: '.'
      ubuntu-version:
        description: 'Ubuntu version for actions runner (default: 22.04)'
        required: false
        type: string
        default: '22.04'

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-${{ inputs.ubuntu-version }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Start govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
